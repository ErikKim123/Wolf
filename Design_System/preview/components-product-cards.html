<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff;margin:0;display:flex;gap:12px}
.card{width:200px;display:flex;flex-direction:column;gap:8px}
.img{width:100%;aspect-ratio:1/1;background:#F5F5F5;border-radius:0;overflow:hidden}
.img img{width:100%;height:100%;display:block}
.title{font-family:var(--jnj-font-text-medium);font-size:14px;font-weight:500;color:#111;margin:0}
.meta{font-family:var(--jnj-font-text);font-size:13px;color:#707072;margin:0}
.price{font-family:var(--jnj-font-text-medium);font-size:14px;font-weight:500;color:#111;margin:0}
</style></head><body>
<div class="card">
  <div class="img"><img src="../assets/product-cleat.svg" alt=""></div>
  <p class="title">Velocity Cleat 7</p>
  <p class="meta">Men's Soccer · Firm Ground</p>
  <p class="price">$185</p>
</div>
<div class="card">
  <div class="img"><img src="../assets/product-runner.svg" alt=""></div>
  <p class="title">Pace Runner Pro</p>
  <p class="meta">Road Running</p>
  <p class="price">$160</p>
</div>
<div class="card">
  <div class="img"><img src="../assets/product-trainer.svg" alt=""></div>
  <p class="title">Crosstrain 02</p>
  <p class="meta">Training · All Day</p>
  <p class="price">$130</p>
</div>
</body></html>
