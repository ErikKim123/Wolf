<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:0;background:#fff;margin:0}
.banner{background:#111;color:#fff;text-align:center;padding:8px;font-family:var(--jnj-font-text-medium);font-size:12px;font-weight:500}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;height:60px;box-sizing:border-box;border-bottom:1px solid #F5F5F5}
.logo{height:24px}
.links{display:flex;gap:20px}
.links a{font-family:var(--jnj-font-text-medium);font-size:14px;font-weight:500;color:#111;text-decoration:none}
.icons{display:flex;gap:12px;align-items:center}
.search{background:#F5F5F5;border-radius:24px;padding:8px 16px;width:130px;display:flex;align-items:center;gap:8px;color:#707072;font-family:var(--jnj-font-text);font-size:13px}
.icon{width:24px;height:24px;color:#111}
</style></head><body>
<div class="banner">JNJ Members: Free shipping. No minimum.</div>
<div class="nav">
  <img class="logo" src="../assets/logo.svg" alt="JNJ SCORE">
  <div class="links"><a>New</a><a>Men</a><a>Women</a><a>Kids</a><a>Sale</a></div>
  <div class="icons">
    <div class="search"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>Search</div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
  </div>
</div>
</body></html>
