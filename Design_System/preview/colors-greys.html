<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff}
.row{display:flex;gap:8px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}
.chip{width:90px;height:56px;border-radius:8px;border:1px solid #E5E5E5}
.lbl{font-family:var(--jnj-font-text-medium);font-size:11px;font-weight:500;color:#111}
.hex{font-family:var(--jnj-font-text);font-size:10px;color:#707072}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#FAFAFA"></div><div class="lbl">Grey 50</div><div class="hex">#FAFAFA</div></div>
  <div class="sw"><div class="chip" style="background:#F5F5F5"></div><div class="lbl">Grey 100</div><div class="hex">#F5F5F5</div></div>
  <div class="sw"><div class="chip" style="background:#E5E5E5"></div><div class="lbl">Grey 200</div><div class="hex">#E5E5E5</div></div>
  <div class="sw"><div class="chip" style="background:#CACACB"></div><div class="lbl">Grey 300</div><div class="hex">#CACACB</div></div>
  <div class="sw"><div class="chip" style="background:#9E9EA0"></div><div class="lbl">Grey 400</div><div class="hex">#9E9EA0</div></div>
  <div class="sw"><div class="chip" style="background:#707072"></div><div class="lbl">Grey 500</div><div class="hex">#707072</div></div>
  <div class="sw"><div class="chip" style="background:#4B4B4D"></div><div class="lbl">Grey 600</div><div class="hex">#4B4B4D</div></div>
  <div class="sw"><div class="chip" style="background:#39393B"></div><div class="lbl">Grey 700</div><div class="hex">#39393B</div></div>
</div>
</body></html>
