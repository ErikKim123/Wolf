<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff;margin:0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.badge{font-family:var(--jnj-font-text-medium);font-size:12px;font-weight:500;padding:4px 10px;border-radius:30px;text-transform:uppercase;letter-spacing:0.5px}
.b-sale{background:#D30005;color:#fff}
.b-live{background:#FF5000;color:#fff;display:flex;align-items:center;gap:6px}
.b-live::before{content:"";width:6px;height:6px;border-radius:50%;background:#fff}
.b-new{background:#111;color:#fff}
.b-soldout{background:#E5E5E5;color:#9E9EA0}
.b-member{border:1.5px solid #111;color:#111}
.b-promo{background:#D33918;color:#fff}
</style></head><body>
<span class="badge b-sale">Sale</span>
<span class="badge b-live">Live</span>
<span class="badge b-new">Just dropped</span>
<span class="badge b-soldout">Sold out</span>
<span class="badge b-member">Members only</span>
<span class="badge b-promo">-30%</span>
</body></html>
