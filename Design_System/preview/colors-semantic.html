<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px;width:130px}
.chip{height:64px;border-radius:8px;border:1px solid #E5E5E5;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--jnj-font-display);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.lbl{font-family:var(--jnj-font-text-medium);font-size:11px;font-weight:500;color:#111}
.hex{font-family:var(--jnj-font-text);font-size:10px;color:#707072}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#D30005">ERROR</div><div class="lbl">Nike Red</div><div class="hex">#D30005</div></div>
  <div class="sw"><div class="chip" style="background:#FF5000">LIVE</div><div class="lbl">Orange Flash</div><div class="hex">#FF5000</div></div>
  <div class="sw"><div class="chip" style="background:#007D48">SUCCESS</div><div class="lbl">Success Green</div><div class="hex">#007D48</div></div>
  <div class="sw"><div class="chip" style="background:#1151FF">LINK</div><div class="lbl">Link Blue</div><div class="hex">#1151FF</div></div>
  <div class="sw"><div class="chip" style="background:#FEDF35;color:#111">WARN</div><div class="lbl">Warning</div><div class="hex">#FEDF35</div></div>
</div>
</body></html>
