<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:0;background:#111;margin:0;color:#fff}
.wrap{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;gap:24px}
.match{display:flex;align-items:center;gap:18px}
.team{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:64px}
.tlogo{width:40px;height:40px;background:#28282A;border-radius:50%}
.tname{font-family:var(--jnj-font-text-medium);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.score{font-family:'Oswald',Arial;font-size:48px;font-weight:500;line-height:1;letter-spacing:-1px}
.live{background:#FF5000;color:#fff;font-family:var(--jnj-font-text-medium);font-size:10px;font-weight:500;padding:4px 8px;border-radius:30px;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.live::before{content:"";width:5px;height:5px;border-radius:50%;background:#fff}
.meta{font-family:var(--jnj-font-text);font-size:12px;color:#9E9EA0}
</style></head><body>
<div class="wrap">
  <div class="match">
    <div class="team"><div class="tlogo"></div><div class="tname">ARS</div></div>
    <div class="score">2</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div class="live">LIVE 67'</div><div class="meta">Premier League</div></div>
    <div class="score">1</div>
    <div class="team"><div class="tlogo"></div><div class="tname">CHE</div></div>
  </div>
  <button class="jnj-btn jnj-btn-inverse jnj-btn-sm">Watch</button>
</div>
</body></html>
