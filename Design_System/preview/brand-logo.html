<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff;margin:0;display:flex;gap:24px;align-items:center}
.box{padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px}
.b1{background:#fff}
.b2{background:#111}
.b2 svg text{fill:#fff!important}
.lbl{font-family:var(--jnj-font-text-medium);font-size:10px;font-weight:500;color:#707072;text-transform:uppercase;letter-spacing:1px}
.b2 .lbl{color:#9E9EA0}
</style></head><body>
<div class="box b1"><img src="../assets/logo.svg" alt="JNJ SCORE" style="height:40px"><div class="lbl">Wordmark · light</div></div>
<div class="box b2">
  <svg viewBox="0 0 320 64" style="height:40px">
    <text x="0" y="50" font-family="Oswald, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#FFFFFF" letter-spacing="-1" style="text-transform:uppercase">JNJ</text>
    <rect x="120" y="28" width="14" height="14" fill="#FF5000"/>
    <text x="146" y="50" font-family="Oswald, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="56" fill="#FFFFFF" letter-spacing="-1" style="text-transform:uppercase">SCORE</text>
  </svg>
  <div class="lbl">Wordmark · dark</div>
</div>
<div class="box b1"><img src="../assets/monogram.svg" alt="" style="height:48px;width:48px"><div class="lbl">Monogram</div></div>
</body></html>
