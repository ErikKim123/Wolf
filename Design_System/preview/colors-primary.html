<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:#fff}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px}
.chip{width:120px;height:64px;border-radius:8px;border:1px solid #E5E5E5}
.lbl{font-family:var(--jnj-font-text-medium);font-size:11px;font-weight:500;color:#111}
.hex{font-family:var(--jnj-font-text);font-size:11px;color:#707072}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#111111"></div><div class="lbl">JNJ Black</div><div class="hex">#111111</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="lbl">JNJ White</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#1F1F21"></div><div class="lbl">Deep Charcoal</div><div class="hex">#1F1F21</div></div>
  <div class="sw"><div class="chip" style="background:#28282A"></div><div class="lbl">Dark Surface</div><div class="hex">#28282A</div></div>
</div>
</body></html>
